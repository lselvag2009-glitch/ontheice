*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
:root{--accent:#C8102E;--accent2:#0057A8;--bg:#07080F;--card:rgba(10,22,40,0.85);--text:#E8E8F0;--sub:#3A5A7A;--border:rgba(168,200,232,0.1);}

button{cursor:pointer;font-family:inherit;border:none;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.press:active{transform:scale(0.96);transition:transform 0.08s;}
#splash{position:fixed;inset:0;z-index:9999;background:#07080F;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;animation:splashOut 0.4s ease 2.2s forwards;}
.s-title{font-family:'Bebas Neue',Impact,sans-serif;font-size:38px;letter-spacing:5px;background:linear-gradient(135deg,#E8C4B8,#C8102E 40%,#0057A8 70%,#A8C8E8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.s-sub{font-size:10px;letter-spacing:4px;color:#2A4060;text-transform:uppercase;}
.s-bar{width:140px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
@keyframes fill{from{width:0}to{width:100%}}
.s-fill{height:100%;background:linear-gradient(90deg,#C8102E,#0057A8);animation:fill 2s ease forwards;}
#topbar{background:rgba(7,8,15,0.95);border-bottom:1px solid rgba(200,16,46,0.15);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(10px,env(safe-area-inset-top,10px));}

#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
#content{padding:14px;max-width:500px;margin:0 auto;padding-bottom:24px;}
#nav{display:flex;background:rgba(6,10,20,0.97);border-top:1px solid rgba(200,16,46,0.2);padding-bottom:env(safe-area-inset-bottom,8px);flex-shrink:0;}
#nav button{flex:1;padding:10px 0 6px;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:#3A5A7A;border:none;font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;transition:color 0.2s;}

.stitle{display:flex;align-items:center;gap:8px;margin-bottom:12px;}

.quote-card{border-radius:16px;padding:16px 18px;margin-bottom:14px;position:relative;overflow:hidden;}
.mood-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.mood-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:7px 10px;display:flex;align-items:center;gap:5px;color:#5A7A9A;font-size:12px;font-weight:600;}
.cpick{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.cpick .cc{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.cpick .cc.active{border-color:#fff;}
.pom-circle{position:relative;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;}
.pom-time{position:absolute;text-align:center;}
#toast-wrap{position:fixed;top:12px;left:16px;right:16px;z-index:9998;pointer-events:none;}
.toast{background:rgba(10,22,40,0.97);border-radius:12px;padding:11px 15px;margin-bottom:8px;border-left:4px solid var(--accent);animation:slideUp 0.3s ease;box-shadow:0 8px 32px rgba(0,0,0,0.8);}
.toast .tt{font-weight:700;font-size:13px;}
.toast .tb{font-size:12px;color:#6A8BAA;}
.section{animation:fadeIn 0.3s ease;}
.frow{display:flex;gap:8px;margin-bottom:10px;}
.frow input,.frow select{margin-bottom:0;}

.spinner{width:32px;height:32px;border:3px solid rgba(200,16,46,0.2);border-top-color:#C8102E;border-radius:50%;animation:spin 0.8s linear infinite;}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:16px;}
</style>

const QUOTES=[
  {t:"«\u00a0Tu me détestes tellement que tu ne peux même pas me regarder.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0Sur la glace, on est ennemis. En dehors... je ne sais plus ce qu'on est.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Chaque fois que je te vois, je me rappelle pourquoi je joue à ce sport.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0La rivalité s'arrête quand la sirène sonne. Ce qui vient après... c'est une autre histoire.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Tu crois que je ne te vois pas ? Je ne vois que toi.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0On était faits pour être dans des camps opposés.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Chaque cicatrice sur cette glace porte ton nom.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0La haine, c'est de l'amour qui porte un masque de hockey.\u00a0»",a:"— Rivalité Brûlante",c:"B"},

  {t:"«\u00a0Je ne t'ai pas choisi. Mais si j'avais pu choisir, ce serait encore toi.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0On ne peut pas être amis. On ne peut pas être ennemis. Alors qu'est-ce qu'on est ?\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0Dix ans à jouer la comédie. Et la seule chose réelle, c'était toi.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Je t'en veux d'être aussi impossible à oublier.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0Tu joues mieux quand tu es en colère contre moi. Alors je continuerai.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Le problème avec toi, c'est que tu es partout — même quand tu n'es pas là.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0Personne ne me regarde comme ça. Même les gens qui m'aiment.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Je pensais qu'on était rivaux. Je ne savais pas qu'on était destinés.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0Sur cette glace, je suis ton adversaire. Dans ma tête, tu es mon seul public.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0C'est épuisant de te haïr. Ça l'est encore plus de ne pas pouvoir m'en empêcher.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0On a passé des années à se blesser. Et maintenant je ne sais plus faire autrement avec toi.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Tu es la seule personne qui me regarde comme si j'étais à la fois le problème et la solution.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0J'aurais dû m'en douter. La seule chose plus dangereuse que toi sur la glace, c'est toi dans ma tête.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Je ne suis pas en train de tomber amoureux de toi. Je suis en train de réaliser que je l'étais depuis longtemps.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0On s'est battus pendant dix ans. Je suppose qu'on peut apprendre à faire autre chose.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Il y a des gens qui entrent dans ta vie et qui changent la forme de tout ce qui vient après.\u00a0»",a:"— Rivalité Brûlante",c:"B"},
  {t:"«\u00a0Tu sais ce qui est drôle ? Même quand je gagne contre toi, j'ai l'impression de perdre quelque chose.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0J'ai appris à jouer contre toi. Je n'ai jamais appris à vivre sans cette tension.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Les gens pensent qu'on se déteste. Ils ont tort. On se comprend trop bien pour se détester vraiment.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0On dit que les opposés s'attirent. On dit aussi qu'ils se détruisent. Peut-être les deux.\u00a0»",a:"— Rivalité Brûlante",c:"B"},
  {t:"«\u00a0La première fois que tu m'as regardé comme ça, j'ai su que rien ne serait plus simple.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Je joue mieux quand tu es là. C'est le problème.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0On aurait pu être amis si on s'était rencontrés autrement. Mais je suis content qu'on ne l'ait pas fait.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Quelqu'un qui te pousse à être meilleur, même en étant ton adversaire, c'est rare.\u00a0»",a:"— Rivalité Brûlante",c:"B"},
  {t:"«\u00a0Je n'ai pas besoin que tu m'aimes. J'ai besoin que tu sois là.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0La glace ne ment pas. Et toi non plus, quand tu crois que personne ne regarde.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0On a passé des années à faire semblant que c'était de la haine. C'était plus facile.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0Tu es la seule rivale que j'aie jamais voulu garder près de moi.\u00a0»",a:"Ilya Rozanov",c:"I"},
  {t:"«\u00a0Même nos silences sont une conversation.\u00a0»",a:"— Rivalité Brûlante",c:"B"},
  {t:"«\u00a0On se ressemble trop pour être amis. Pas assez pour être ennemis.\u00a0»",a:"Shane Hollander",c:"S"},

  {t:"«\u00a0La rivalité, c'est du respect déguisé en combat.\u00a0»",a:"— Rivalité Brûlante",c:"B"},
  {t:"«\u00a0Tu m'as rendu meilleur sans jamais essayer de le faire.\u00a0»",a:"Shane Hollander",c:"S"},
  {t:"«\u00a0J'aurais préféré ne jamais te rencontrer. J'aurais préféré ne jamais savoir ce que ça fait de te vouloir dans mon camp.\u00a0»",a:"Ilya Rozanov",c:"I"},

// ── SONS ──────────────────────────────────────────────────────────────────────
function playSound(t){
  if(!state.sound)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(t==="check"){o.frequency.value=880;g.gain.setValueAtTime(0.2,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);o.start();o.stop(ctx.currentTime+0.25);}
    else if(t==="done"){const o2=ctx.createOscillator(),g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o.frequency.value=523;o2.frequency.value=659;g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);g2.gain.setValueAtTime(0.15,ctx.currentTime+0.1);g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);o.start();o.stop(ctx.currentTime+0.4);o2.start(ctx.currentTime+0.1);o2.stop(ctx.currentTime+0.5);}
    else if(t==="buzz"){o.type="sawtooth";o.frequency.value=120;g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.7);o.start();o.stop(ctx.currentTime+0.7);}
  }catch(e){}
}
function vib(p=[10]){if(navigator.vibrate)navigator.vibrate(p);}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(title,body="",color="var(--accent)"){
  const w=document.getElementById("toast-wrap");
  const d=document.createElement("div");
  d.className="toast";d.style.borderLeftColor=color;
  d.innerHTML=`<div class="tt">${title}</div>${body?`<div class="tb">${body}</div>`:""}`;
  w.appendChild(d);setTimeout(()=>d.remove(),3000);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function cat(id){return CATS.find(c=>c.id===id)||CATS[4];}
function getDIM(y,m){return new Date(y,m+1,0).getDate();}
function getFDOM(y,m){let d=new Date(y,m,1).getDay();return d===0?6:d-1;}
function fmt(ds){return new Date(ds+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});}
function addMin(hm,mn){if(!hm)return"";const[h,m]=hm.split(":").map(Number);const t=h*60+m+mn;return`${String(Math.floor(t/60)%24).padStart(2,"0")}:${String(t%60).padStart(2,"0")}`;}
function evOnDate(ev,ds){
  if(ev.date===ds)return true;
  if(!ev.repeat||ev.repeat==="none")return false;
  const a=new Date(ev.date+"T12:00:00"),b=new Date(ds+"T12:00:00");
  if(b<a)return false;
  if(ev.repeat==="daily")return true;
  if(ev.repeat==="weekly")return Math.round((b-a)/86400000)%7===0;
  if(ev.repeat==="monthly")return a.getDate()===b.getDate();
  return false;
}
function applyTheme(k){
  const t=THEMES[k];
  document.documentElement.style.setProperty("--accent",t.a);
  document.documentElement.style.setProperty("--accent2",t.b);
}
function cpick(val,fn){return`<div class="cpick">${COLORS.map(c=>`<div class="cc press${c===val?" active":""}" style="background:${c}" onclick="${fn}('${c}')"></div>`).join("")}</div>`;}
function catSel(val,fn){return`<select onchange="${fn}(this.value)" class="mb">${CATS.map(c=>`<option value="${c.id}"${c.id===val?" selected":""}>${c.icon} ${c.label}</option>`).join("")}</select>`;}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const done=state.tasks.filter(t=>t.done).length,total=state.tasks.length;
  document.getElementById("today-label").textContent=new Date().toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}).toUpperCase();
  document.getElementById("score-label").textContent=`${done}/${total} tâches`;
  document.querySelectorAll("#nav button").forEach(b=>b.classList.remove("active"));
  const nb=document.getElementById(`nav-${state.view}`);if(nb)nb.classList.add("active");
  document.getElementById("nav").style.display=state.view==="settings"?"none":"flex";
  document.getElementById("content").innerHTML=renderSection();
  document.getElementById("scroll").scrollTop=0;

  // Pomodoro timer
  if(state.pom.running&&!window._pt){
    window._pt=setInterval(()=>{
      state.pom.secs--;
      if(state.pom.secs<=0){
        clearInterval(window._pt);window._pt=null;state.pom.running=false;
        playSound("buzz");vib([200,100,200]);
        if(state.pom.mode==="work"){state.pom.sessions++;state.pom.mode="break";state.pom.secs=5*60;}
        else{state.pom.mode="work";state.pom.secs=25*60;}
        render();return;
      }
      const mm=String(Math.floor(state.pom.secs/60)).padStart(2,"0"),ss=String(state.pom.secs%60).padStart(2,"0");
      const pt=document.querySelector(".pom-time .pt");if(pt)pt.textContent=`${mm}:${ss}`;
      const arc=document.querySelector("#pom-arc");
      if(arc){const r=52,circ=2*Math.PI*r,base=state.pom.mode==="work"?25*60:5*60,pct=1-state.pom.secs/base;arc.style.strokeDashoffset=circ*(1-pct);}
    },1000);
  } else if(!state.pom.running&&window._pt){clearInterval(window._pt);window._pt=null;}
}

}

// ── CINÉ & SÉRIES ─────────────────────────────────────────────────────────────
const TMDB_KEY = "41014af0f559f6541f2da4cd1c5acc1a";
const TMDB = "https://api.themoviedb.org/3";
const TMDB_IMG = "https://image.tmdb.org/t/p/w200";
const PLATFORM_COLORS = {"Netflix":"#E50914","Disney+":"#113CCF","HBO":"#8B5CF6","Apple TV+":"#A0A0A0","Prime Video":"#00A8E0","Paramount+":"#0064FF","Max":"#8B5CF6","Hulu":"#1CE783"};
const PROVIDER_MAP = {8:"Netflix",337:"Disney+",119:"Prime Video",384:"HBO",350:"Apple TV+",531:"Paramount+",1899:"Max",15:"Hulu"};

const CINE_CACHE = {cinema:null, series:null};
const CINE_LOADING = {cinema:false, series:false};
let cineTab = "cinema";
let cineSearch = "";
let cineSearchResults = null;
let cineSearchLoading = false;

async function searchTMDB(){
  const q = cineSearch.trim();
  if(!q){ cineSearchResults=null; render(); return; }
  cineSearchLoading = true; render();
  try{
    const type = cineTab==="cinema" ? "movie" : "tv";
    const data = await tmdbFetch(`/search/${type}?query=${encodeURIComponent(q)}&page=1`);
    cineSearchResults = (data.results||[]).slice(0,8).map(m=>({
      title: m.title||m.name,
      date: (m.release_date||m.first_air_date) ? new Date((m.release_date||m.first_air_date)).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"}) : "",
      score: m.vote_average ? m.vote_average.toFixed(1) : "N/A",
      synopsis: m.overview ? (m.overview.slice(0,120)+(m.overview.length>120?"...":"")) : "Synopsis non disponible.",
      poster: m.poster_path ? TMDB_IMG+m.poster_path : null,
    }));
  }catch(e){ cineSearchResults=[]; }
  cineSearchLoading = false; render();
}

let _searchTimer = null;
function onCineSearch(val){
  cineSearch = val;
  clearTimeout(_searchTimer);
  if(!val.trim()){ cineSearchResults=null; render(); return; }
  _searchTimer = setTimeout(searchTMDB, 500);
}

async function tmdbFetch(path){
  const sep = path.includes("?") ? "&" : "?";
  const url = `${TMDB}${path}${sep}api_key=${TMDB_KEY}&language=fr-FR`;
  const res = await fetch(url, {
    headers: { "Content-Type": "application/json" }
  });
  if(!res.ok) throw new Error(`TMDB ${res.status}`);
  return res.json();
}

async function fetchCine(tab){
  if(CINE_CACHE[tab]||CINE_LOADING[tab]) return;
  CINE_LOADING[tab]=true; render();
  try{
    if(tab==="cinema"){
      const [nowData, upData] = await Promise.all([
        tmdbFetch("/movie/now_playing?region=FR&page=1"),
        tmdbFetch("/movie/upcoming?region=FR&page=1")
      ]);
      CINE_CACHE.cinema = {
        nowPlaying: (nowData.results||[]).slice(0,6).map(m=>({
          title: m.title,
          date: m.release_date ? new Date(m.release_date).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"}) : "",
          score: m.vote_average ? m.vote_average.toFixed(1) : "N/A",
          synopsis: m.overview ? (m.overview.slice(0,120)+(m.overview.length>120?"...":"")) : "Synopsis non disponible.",
          poster: m.poster_path ? TMDB_IMG+m.poster_path : null,
        })),
        upcoming: (upData.results||[]).slice(0,5).map(m=>({
          title: m.title,
          date: m.release_date ? new Date(m.release_date).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"}) : "2026",
          poster: m.poster_path ? TMDB_IMG+m.poster_path : null,
          score: m.vote_average ? m.vote_average.toFixed(1) : "N/A",
        }))
      };
    } else {
      const [airData, popData, upcomingData] = await Promise.all([
        tmdbFetch("/tv/on_the_air?page=1"),
        tmdbFetch("/tv/popular?page=1"),
        tmdbFetch("/tv/airing_today?page=1")
      ]);

      // Séries en cours
      const newReleases = (airData.results||[]).slice(0,5).map(s=>({
        title: s.name,
        platform: "Streaming",
        date: s.first_air_date ? new Date(s.first_air_date).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"}) : "",
        synopsis: s.overview ? (s.overview.slice(0,120)+(s.overview.length>120?"...":"")) : "Synopsis non disponible.",
        poster: s.poster_path ? TMDB_IMG+s.poster_path : null,
        score: s.vote_average ? s.vote_average.toFixed(1) : "N/A",
      }));

      // Prochaines saisons — séries populaires avec plusieurs saisons
      const withSeasons = await Promise.all(
        (popData.results||[]).slice(0,8).map(async s=>{
          try{
            const detail = await tmdbFetch(`/tv/${s.id}`);
            return {
              title: detail.name,
              seasons: detail.number_of_seasons||1,
              nextSeason: (detail.number_of_seasons||1)+1,
              status: detail.status,
              date: detail.next_episode_to_air?.air_date
                ? new Date(detail.next_episode_to_air.air_date).toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"})
                : detail.last_air_date
                  ? new Date(detail.last_air_date).toLocaleDateString("fr-FR",{month:"short",year:"numeric"})
                  : "À venir",
              poster: detail.poster_path ? TMDB_IMG+detail.poster_path : null,
              score: detail.vote_average ? detail.vote_average.toFixed(1) : "N/A",
              network: detail.networks?.[0]?.name || "Streaming",
            };
          }catch{return null;}
        })
      );

      CINE_CACHE.series = {
        newReleases,
        upcoming: withSeasons.filter(s=>s&&s.seasons>1).slice(0,6)
      };
    }
  }catch(e){
    console.error("TMDB error:",e);
    CINE_CACHE[tab]={error:true,msg:e.message};
  }
  CINE_LOADING[tab]=false; render();
}

function renderCine(){
  const d=CINE_CACHE[cineTab];
  const loading=CINE_LOADING[cineTab];
  const tabs=[{k:"cinema",l:"🎬 Cinéma",c:"#E8A000"},{k:"series",l:"📺 Séries",c:"#E50914"}];
  const tc=tabs.find(t=>t.k===cineTab);
  if(!d&&!loading) fetchCine(cineTab);

  const searchCard = cineSearchResults ? `
    <div class="stitle"><div class="bar" style="background:${tc.c};"></div><span style="color:${tc.c};">🔍 Résultats pour "${cineSearch}"</span></div>

function renderPom(){
  const p=state.pom,mm=String(Math.floor(p.secs/60)).padStart(2,"0"),ss=String(p.secs%60).padStart(2,"0");
  const r=52,circ=2*Math.PI*r,base=p.mode==="work"?25*60:5*60,pct=1-p.secs/base;
  const col=p.mode==="work"?"var(--accent)":"#2E7D32";
  return`<div class="card" style="text-align:center;">
  <div class="stitle" style="justify-content:center;"><div class="bar" style="background:${col};"></div><span style="color:${col};">${p.mode==="work"?"🏒 Concentration":"☕ Pause"}</span></div>
  <div class="pom-circle">
    <svg width="130" height="130" style="transform:rotate(-90deg);">
      <circle cx="65" cy="65" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
      <circle id="pom-arc" cx="65" cy="65" r="${r}" fill="none" stroke="${col}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}" style="transition:stroke-dashoffset 1s linear;"/>
    </svg>
    <div class="pom-time"><div class="pt" style="font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;line-height:1;">${mm}:${ss}</div><div style="font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;">${p.mode==="work"?"TRAVAIL":"PAUSE"}</div></div>
  </div>
  <div style="display:flex;gap:10px;margin-bottom:14px;"><button class="btn" onclick="togglePom()" style="flex:1;background:linear-gradient(135deg,${col},${col}88);">${p.running?"⏸ Pause":"▶ Go"}</button><button onclick="resetPom()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:13px 16px;color:#666;font-weight:700;font-size:14px;" class="press">↺</button></div>
  <div style="display:flex;justify-content:center;gap:6px;margin-bottom:8px;">${Array.from({length:Math.min(p.sessions,8)},()=>`<div style="width:8px;height:8px;border-radius:50%;background:var(--accent);"></div>`).join("")}</div>
  <div style="font-size:12px;color:var(--sub);">${p.sessions} session${p.sessions>1?"s":""} complétée${p.sessions>1?"s":""}</div>
  <div style="display:flex;justify-content:center;gap:8px;margin-top:12px;">${[{l:"25 min",v:1500,m:"work"},{l:"5 min",v:300,m:"break"},{l:"15 min",v:900,m:"break"}].map(pr=>`<button onclick="setPomDur(${pr.v},'${pr.m}')" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 10px;color:#5A7A9A;font-size:11px;font-weight:600;" class="press">${pr.l}</button>`).join("")}</div>
</div>`;
}

function renderHabits(){
  const tc=state.checked[todayStr]||{},done=state.habits.filter(h=>tc[h.id]).length,pct=state.habits.length?(done/state.habits.length)*100:0;
  const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d.toISOString().slice(0,10);});
  return`<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;"><div class="stitle" style="margin-bottom:0;"><div class="bar" style="background:var(--accent);"></div><span style="color:var(--accent);">🌱 Habitudes</span></div><button onclick="state.showHabitForm=!state.showHabitForm;render();" style="background:rgba(200,16,46,0.2);border:1px solid rgba(200,16,46,0.4);border-radius:8px;padding:5px 10px;color:var(--accent);font-size:11px;font-weight:700;" class="press">+</button></div>
  <div style="margin-bottom:14px;"><div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:12px;color:var(--sub);">Aujourd'hui</span><span style="font-size:12px;font-weight:700;color:var(--accent);">${done}/${state.habits.length}</span></div><div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%"></div></div></div>
  <div style="display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;">${last7.map(ds=>{const dc=state.checked[ds]||{},cnt=state.habits.filter(h=>dc[h.id]).length,isT=ds===todayStr,dw=new Date(ds+"T12:00:00").getDay();return`<div style="text-align:center;min-width:36px;"><div style="font-size:9px;color:var(--sub);font-weight:700;margin-bottom:4px;">${DAYS[dw===0?6:dw-1]}</div><div style="width:32px;height:32px;border-radius:10px;background:${cnt===state.habits.length?"linear-gradient(135deg,var(--accent),var(--accent2))":cnt>0?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.03)"};border:${isT?"2px solid rgba(200,16,46,0.5)":"2px solid transparent"};display:flex;align-items:center;justify-content:center;margin:0 auto;"><span style="font-size:11px;font-weight:700;color:${cnt===state.habits.length?"#fff":cnt>0?"var(--accent)":"var(--sub)"};">${cnt}</span></div></div>`;}).join("")}</div>
  ${state.habits.map(h=>{const d2=!!(tc[h.id]);return`<div class="habit-item press" onclick="toggleHabit('${h.id}')" style="background:${d2?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.03)"};border:1px solid ${d2?h.color+"44":"rgba(255,255,255,0.06)"};">
    <div style="width:32px;height:32px;border-radius:10px;background:${d2?`linear-gradient(135deg,${h.color},${h.color}88)`:"rgba(255,255,255,0.06)"};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">${h.icon}</div>
    <span style="flex:1;font-size:14px;color:${d2?"var(--text)":"#7A9BBB"};font-weight:${d2?"600":"400"};">${h.label}</span>
    <div style="width:22px;height:22px;border-radius:6px;background:${d2?h.color:"transparent"};border:2px solid ${d2?h.color:"rgba(255,255,255,0.15)"};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${d2?`<span style="font-size:12px;color:#fff;">✓</span>`:""}</div>
  </div>`;}).join("")}
  ${state.showHabitForm?`<div style="margin-top:12px;padding:12px;background:rgba(255,255,255,0.04);border-radius:12px;border:1px solid rgba(255,255,255,0.08);"><div style="display:flex;gap:8px;margin-bottom:10px;"><input value="${state.newHabit.icon}" oninput="state.newHabit.icon=this.value" style="width:50px;text-align:center;font-size:20px;"/><input value="${state.newHabit.label}" placeholder="Nouvelle habitude..." oninput="state.newHabit.label=this.value" style="flex:1;"/></div>${cpick(state.newHabit.color,"c=>state.newHabit.color=c")}<button class="btn" onclick="addHabit()">Ajouter</button></div>`:""}
</div>`;
}

function renderJournal(){
  const j=state.journal[state.selDay]||{};
  const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return d.toISOString().slice(0,10);}).reverse();

function saveJournalFull(){
  if(!state.journalDraft.trim()&&!state.journalMood&&!state.journalEmoji)return;
  state.journal[state.selDay]={
    text:state.journalDraft,
    mood:state.journalMood,
    emoji:state.journalEmoji,
    tags:[...state.journalTags],
    date:state.selDay
  };
  vib([10,5,10]);playSound("done");toast("💾 Journal sauvegardé","","var(--accent)");save();render();
}
function toggleJournalTag(t){
  if(!state.journalTags)state.journalTags=[];
  state.journalTags=state.journalTags.includes(t)?state.journalTags.filter(x=>x!==t):[...state.journalTags,t];
  render();
}
function addJournalTag(){
  const t=(state.journalTagInput||"").trim();
  if(!t)return;
  const tag=t.startsWith("#")?t:`#${t}`;
  if(!state.journalTags)state.journalTags=[];
  if(!state.journalTags.includes(tag))state.journalTags.push(tag);
  state.journalTagInput="";render();
}
function removeJournalTag(t){state.journalTags=(state.journalTags||[]).filter(x=>x!==t);render();}
function pinInput(k){
  if(k==="✕"){state.journalPinInput="";render();return;}
  if(k==="✓"){
    if(state.journalPinInput===state.journalPin){state.journalLocked=false;state.journalPinInput="";render();}
    else{vib([100,50,100]);render();}
    return;
  }
  if(state.journalPinInput.length<4){state.journalPinInput+=String(k);render();}
}
function setJournalPin(){
  const p=(state.journalPinInput||"").replace(/\D/g,"").slice(0,4);
  if(p&&p.length<4){toast("⚠️","Le PIN doit avoir 4 chiffres","#FFA500");return;}
  state.journalPin=p;state.journalLocked=p!=="";state.journalPinInput="";
  LS.set("oti_jpin",p);toast(p?"🔒 PIN activé":"🔓 PIN supprimé","","var(--accent)");render();
}

  const items=[
    {icon:"🎬",label:"Ciné & Séries",desc:"Films et séries du moment",section:"cine",color:"#E8A000"},
    {icon:"🎵",label:"Musique",desc:"Playlists et artistes",section:"music",color:"#1DB954"},

// ── MÉTÉO ─────────────────────────────────────────────────────────────────────
async function fetchWeather(){
  if(state.weatherLoading||state.weather)return;
  state.weatherLoading=true;render();
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000}));
    const {latitude:lat,longitude:lon}=pos.coords;
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m&timezone=auto`);
    const d=await r.json();
    state.weather={temp:Math.round(d.current.temperature_2m),code:d.current.weathercode,wind:Math.round(d.current.windspeed_10m),icon:WEATHER_ICONS[d.current.weathercode]||"🌡️"};
  }catch(e){state.weather={error:true};}
  state.weatherLoading=false;render();
}

  <!-- THÈME -->
  <div class="stitle"><div class="bar" style="background:var(--accent);"></div><span style="color:var(--accent);">🎨 Thème</span></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">${Object.entries(THEMES).map(([k,t])=>`<button onclick="setTheme('${k}')" style="background:${state.theme===k?t.a+"22":"rgba(255,255,255,0.04)"};border:${state.theme===k?`1.5px solid ${t.a}`:"1px solid rgba(255,255,255,0.08)"};border-radius:14px;padding:14px 12px;text-align:left;" class="press"><div style="width:24px;height:24px;border-radius:8px;background:linear-gradient(135deg,${t.a},${t.b});margin-bottom:8px;"></div><div style="font-size:13px;font-weight:700;color:var(--text);">${t.n}</div></button>`).join("")}</div>

  <!-- SONS -->
  <div class="stitle"><div class="bar" style="background:var(--accent);"></div><span style="color:var(--accent);">🔊 Sons</span></div>
  <div class="toggle-row press" onclick="toggleSound()">
    <div style="font-size:22px;">${state.sound?"🔊":"🔇"}</div>
    <div style="flex:1;"><div style="font-size:14px;font-weight:600;">Sons de l'appli</div><div style="font-size:12px;color:var(--sub);">Bruitage de patins, sirène, mélodie</div></div>
    <div class="toggle" style="background:${state.sound?"linear-gradient(90deg,var(--accent),var(--accent2))":"rgba(255,255,255,0.1)"};">
      <div class="knob" style="left:${state.sound?"23px":"3px"};"></div>
    </div>
  </div>

  <!-- À PROPOS -->
  <div class="stitle" style="margin-top:8px;"><div class="bar" style="background:var(--sub);"></div><span style="color:var(--sub);">ℹ️ À propos</span></div>
  <div class="card"><div style="font-family:'Bebas Neue',Impact,sans-serif;font-size:20px;letter-spacing:3px;background:linear-gradient(135deg,#E8C4B8,#C8102E 40%,#0057A8 70%,#A8C8E8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;">ON THE ICE</div><div style="font-size:12px;color:var(--sub);line-height:1.6;">Inspiré de <em style="color:#A8C8E8;">Heated Rivalry</em> de Casey McQuiston.<br/>Shane & Ilya forever. 🏒💙</div></div>
</div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function showSection(v){state.view=v;render();}
function nextQuote(){state.quoteIdx=(state.quoteIdx+1)%QUOTES.length;vib([5]);render();}
function toggleFav(i){state.favs=state.favs.includes(i)?state.favs.filter(x=>x!==i):[...state.favs,i];save();render();}
function quickCheck(id){vib([8]);playSound("check");state.tasks=state.tasks.map(t=>t.id===id?{...t,done:!t.done}:t);if(state.tasks.find(t=>t.id===id).done&&state.tasks.filter(t=>!t.done).length===0)setTimeout(()=>{playSound("done");vib([100,50,100]);},100);save();render();}
function toggleTask(id){quickCheck(id);}
function toggleTaskForm(){state.showTaskForm=!state.showTaskForm;render();}
function addTask(){const nt=state.newTask;if(!nt.text.trim())return;state.tasks.push({id:Date.now(),text:nt.text,done:false,priority:nt.priority,color:nt.color,category:nt.category,reminder:nt.reminder});vib([10,5,10]);playSound("check");state.newTask={text:"",priority:"medium",color:"#0057A8",category:"match",reminder:""};state.showTaskForm=false;save();render();}
function deleteTask(id){vib([20]);state.tasks=state.tasks.filter(t=>t.id!==id);save();render();}
function toggleNoteForm(){state.showNoteForm=!state.showNoteForm;state.editNoteId=null;render();}
function addNote(){const nn=state.newNote;if(!nn.title.trim())return;state.notes.push({id:Date.now(),...nn,pinned:false,date:todayStr});vib([10,5,10]);state.newNote={title:"",body:"",color:"#0057A8",category:"match"};state.showNoteForm=false;save();render();}
function togglePin(id){vib([8]);state.notes=state.notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n);save();render();}
function deleteNote(id){vib([20]);state.notes=state.notes.filter(n=>n.id!==id);save();render();}
function editNote(id){state.editNoteId=id;state.showNoteForm=false;render();}
function updateEN(k,v){const n=state.notes.find(n=>n.id===state.editNoteId);if(n)n[k]=v;}
function saveNote(){vib([10,5,10]);state.editNoteId=null;save();render();}
function selDay(ds){state.selDay=ds;state.journalDraft=state.journal[ds]?.text||"";state.journalMood=state.journal[ds]?.mood||null;state.showEvForm=false;state.editEvId=null;state.showSpecial=false;render();}
function prevMonth(){if(state.calMonth===0){state.calMonth=11;state.calYear--;}else state.calMonth--;render();}
function nextMonth(){if(state.calMonth===11){state.calMonth=0;state.calYear++;}else state.calMonth++;render();}
function prevWeek(){const d=new Date(state.selDay+"T12:00:00");d.setDate(d.getDate()-7);state.selDay=d.toISOString().slice(0,10);render();}
function nextWeek(){const d=new Date(state.selDay+"T12:00:00");d.setDate(d.getDate()+7);state.selDay=d.toISOString().slice(0,10);render();}
function setSpecial(id){state.special[state.selDay]=state.special[state.selDay]===id?undefined:id;state.showSpecial=false;save();render();}
function clearSpecial(){delete state.special[state.selDay];state.showSpecial=false;save();render();}
function openEvForm(){state.showEvForm=true;state.editEvId=null;state.newEv={title:"",date:state.selDay,tStart:"09:00",tEnd:"10:00",color:"#C8102E",category:"match",reminder:"",repeat:"none",note:"",lieu:""};render();}
function editEv(id){state.editEvId=id;state.showEvForm=true;// Copie l'événement dans newEv pour l'édition
const ev=state.events.find(e=>e.id===id);if(ev)state.newEv={...ev};render();}
function cancelEvForm(){state.showEvForm=false;state.editEvId=null;render();}
function saveEv(){
  const ef=state.newEv;
  if(!ef||!ef.title.trim()){toast("⚠️","Le titre est obligatoire","#FFA500");return;}
  if(state.editEvId){
    state.events=state.events.map(e=>e.id===state.editEvId?{...ef,id:state.editEvId}:e);
  } else {
    state.events.push({...ef,id:Date.now()});
  }
  vib([10,5,10]);toast("✅ Évènement",ef.title,ef.color);
  state.showEvForm=false;state.editEvId=null;save();render();
}
function updateEv(k,v){state.newEv[k]=v;}
function deleteEv(id){vib([20]);state.events=state.events.filter(e=>e.id!==id);save();render();}
function togglePom(){state.pom.running=!state.pom.running;if(state.pom.running)playSound("check");render();}
function resetPom(){state.pom.running=false;state.pom.mode="work";state.pom.secs=25*60;if(window._pt){clearInterval(window._pt);window._pt=null;}render();}
function setPomDur(v,m){state.pom.running=false;state.pom.mode=m;state.pom.secs=v;if(window._pt){clearInterval(window._pt);window._pt=null;}render();}
function toggleHabit(hid){vib([8]);playSound("check");if(!state.checked[todayStr])state.checked[todayStr]={};state.checked[todayStr][hid]=!state.checked[todayStr][hid];if(state.habits.filter(h=>state.checked[todayStr][h.id]).length===state.habits.length)setTimeout(()=>{playSound("done");vib([100,50,100]);},100);save();render();}
function addHabit(){const nh=state.newHabit;if(!nh.label.trim())return;state.habits.push({id:Date.now().toString(),...nh});vib([10,5,10]);state.newHabit={label:"",icon:"⭐",color:"#4ECDC4"};state.showHabitForm=false;save();render();}
function saveJournal(){if(!state.journalDraft.trim()&&!state.journalMood)return;state.journal[state.selDay]={text:state.journalDraft,mood:state.journalMood,date:state.selDay};vib([10,5,10]);playSound("done");toast("💾 Journal sauvegardé","","var(--accent)");save();render();}
function setTheme(k){state.theme=k;applyTheme(k);save();render();}
function toggleSound(){state.sound=!state.sound;save();render();}

// ── INIT ──────────────────────────────────────────────────────────────────────
applyTheme(state.theme);
setTimeout(()=>{const s=document.getElementById("splash");if(s)s.style.display="none";},2800);

// Supabase Auth
// Démarre directement sur l'accueil — toujours
document.getElementById("nav").style.display="flex";
applyTheme(state.theme);
render();

// Mode local — données sauvegardées sur cet appareil
</script>
</body>
</html>
